services:
  backend:
    build:
      context: ./backend
    container_name: amilma-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - VT_API_KEY=${VT_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - URLSCAN_API_KEY=${URLSCAN_API_KEY:-}
      - SECURITYTRAILS_API_KEY=${SECURITYTRAILS_API_KEY:-}
    volumes:
      - db-data:/app/db
    restart: unless-stopped

volumes:
  db-data:
